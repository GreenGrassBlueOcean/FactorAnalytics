name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  R-CMD-check:
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    runs-on: ${{ matrix.config.os }}
    continue-on-error: ${{ matrix.config.continue-on-error || false }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macOS-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}
          # R-devel may fail due to upstream deps (e.g., lazyeval PREXPR removal)
          - {os: ubuntu-latest, r: 'devel', http-user-agent: 'release', continue-on-error: true}
          - {os: ubuntu-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_NOTIFICATIONS_BOT_TOKEN }}

    steps:
      - name: GHA Notify Slack - Build Starting
        id: slack
        if: env.SLACK_BOT_TOKEN != ''
        uses: justinr636/github-action-slack-notify-build@v1
        with:
          channel_id: C01MS7ECQ8Z
          status: STARTING
          color: warning

      - name: Check and Install Git LFS
        run: git lfs install
      - uses: actions/checkout@v4
      - name: Generate Git LFS File List
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id
      - name: Restore LFS Cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}-v1
      - name: Pull LFS Files
        run: git lfs pull

      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-tinytex@v2
      - run: tlmgr --version

      - name: Install Ghostscript on Windows
        if: runner.os == 'Windows'
        continue-on-error: true
        run: |
          $url = "https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs10040/gs10040w64.exe"
          $installer = "$env:TEMP\gs_install.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Start-Process -FilePath $installer -ArgumentList "/S" -Wait
          echo "C:\Program Files\gs\gs10.04.0\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Ghostscript on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ghostscript

      - name: Verify macOS pkg-config homebrew
        if: runner.os == 'macOS'
        run: |
          pkg-config --version
          pkg-config --cflags --libs zlib

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: rcmdcheck
      - uses: r-lib/actions/check-r-package@v2

      - name: GHA Slack Notify Build - Success
        if: success() && env.SLACK_BOT_TOKEN != ''
        uses: justinr636/github-action-slack-notify-build@v1
        with:
          message_id: ${{ steps.slack.outputs.message_id }}
          channel_id: C01MS7ECQ8Z
          status: SUCCESS
          color: good

      - name: GHA Slack Notify Build - Failed
        if: failure() && env.SLACK_BOT_TOKEN != ''
        uses: justinr636/github-action-slack-notify-build@v1
        with:
          message_id: ${{ steps.slack.outputs.message_id }}
          channel_id: C01MS7ECQ8Z
          status: FAILED
          color: danger
